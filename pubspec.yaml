name: expense_tracker
description: تطبيق تتبع المصاريف - Expense Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # State Management
  provider: ^6.1.1

  # Charts
  fl_chart: ^0.68.0

  # PDF Export
  pdf: ^3.10.7
  printing: ^5.12.0

  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0

  # Utilities
  intl: ^0.19.0
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  uuid: ^4.2.1

  # Date Picker
  table_calendar: ^3.0.9


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6


flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icon/


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"


flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/app_icon.png
  android: true
  ios: true